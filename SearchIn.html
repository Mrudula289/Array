<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Search in Array</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }

    input {
      padding: 8px;
      font-size: 16px;
    }

    button {
      padding: 8px 12px;
      background-color: blue;
      color: white;
      border: none;
      cursor: pointer;
    }

    .result {
      margin-top: 20px;
      font-size: 18px;
    }

    .highlight {
      background-color: yellow;
      font-weight: bold;
      padding: 5px;
    }

    .not-found {
      color: red;
    }
  </style>
</head>
<body>

  <h2>3. Search in an Array</h2>

  <input type="text" id="searchInput" placeholder="Enter value">
  <button onclick="searchValue()">Search</button>

  <div class="result" id="result"></div>

  <script>
    // Predefined array
    const arr = ["Audi", "BMW", "Tesla", "Toyota", "Honda"];

    function searchValue() {
      const input = document.getElementById("searchInput").value.trim().toLowerCase();
      const resultDiv = document.getElementById("result");

      let found = false;

      // Clear previous result
      resultDiv.innerHTML = "";

      arr.forEach(item => {
        if (item.toLowerCase() === input) {
          resultDiv.innerHTML = `<span class="highlight">${item}</span>`;
          found = true;
        }
      });

      if (!found) {
        resultDiv.innerHTML = `<span class="not-found">Not Found</span>`;
      }
    }
  </script>

</body>
</html>
