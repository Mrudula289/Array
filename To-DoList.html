<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>To-Do List</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  background:#121212;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  color:white;
}

.container{
  background:#1e1e1e;
  padding:20px;
  border-radius:10px;
  width:350px;
}

h2{
  text-align:center;
  margin-bottom:15px;
}

.input-box{
  display:flex;
  gap:10px;
}

input{
  flex:1;
  padding:10px;
  border:none;
  border-radius:5px;
}

button{
  padding:10px;
  border:none;
  background:#1db954;
  color:white;
  border-radius:5px;
  cursor:pointer;
}

/* List */
ul{
  list-style:none;
  margin-top:15px;
}

li{
  background:#2a2a2a;
  padding:10px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  border-radius:5px;
}

.delete{
  background:red;
  border:none;
  color:white;
  padding:5px 8px;
  border-radius:5px;
  cursor:pointer;
  font-size:12px;
}

/* Clear button */
.clear-btn{
  margin-top:10px;
  width:100%;
  background:#444;
}
</style>

</head>

<body>

<div class="container">
  <h2>To-Do List</h2>

  <div class="input-box">
    <input type="text" id="taskInput" placeholder="Enter task...">
    <button onclick="addTask()">Add</button>
  </div>

  <ul id="taskList"></ul>

  <button class="clear-btn" onclick="clearAll()">Clear All</button>
</div>

<script>
function addTask() {
  let input = document.getElementById("taskInput");
  let task = input.value.trim();

  if (task === "") {
    alert("Enter a task!");
    return;
  }

  let li = document.createElement("li");

  li.innerHTML = `
    ${task}
    <button class="delete" onclick="deleteTask(this)">X</button>
  `;

  document.getElementById("taskList").appendChild(li);
  input.value = "";
}

function deleteTask(btn) {
  btn.parentElement.remove();
}

function clearAll() {
  document.getElementById("taskList").innerHTML = "";
}
</script>

</body>
</html>
